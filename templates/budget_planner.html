<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Planner — FinSight AI</title>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav>
    <a href="{{ url_for('dashboard') }}">Dashboard</a>
    <a href="{{ url_for('add_expense') }}">Add Expense</a>
    <a href="{{ url_for('charts') }}">Charts</a>
    <a href="{{ url_for('ai_advisor') }}">AI Advisor</a>
    <a href="{{ url_for('ask_ai') }}">Ask AI</a>
    <a href="{{ url_for('budget_planner') }}" class="active">Budget Planner</a>
    <a href="{{ url_for('goal_planner') }}">Goal Planner</a>
    <a href="{{ url_for('monthly_report') }}">Monthly Report</a>
    <a href="{{ url_for('logout') }}" class="logout">Logout</a>
</nav>

<div class="container" style="max-width:760px;">
    <h2>📋 Smart Budget Planner</h2>
    <p class="page-subtitle">AI creates a personalized budget based on your income</p>

    <div class="box">
        <form method="POST" action="{{ url_for('budget_planner') }}">
            <div class="form-group">
                <label for="income">Your Monthly Income (₹) *</label>
                <input type="number" id="income" name="income"
                       min="1" step="1"
                       value="{{ income }}"
                       placeholder="e.g. 40000">
            </div>
            <button type="submit" class="btn btn-green">
                Generate AI Budget Plan 📊
            </button>
        </form>
    </div>

    {% if budget_plan %}
    <div class="box">
        <h3 style="color:#059669;">📊 Your Personalized Budget Plan</h3>
        <div class="ai-content">{{ budget_plan }}</div>
    </div>
    {% endif %}
</div>
</body>
</html>
